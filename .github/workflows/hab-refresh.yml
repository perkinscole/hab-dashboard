name: Refresh HAB dashboard data

# Regenerates hab-dashboard/data.json so the published site also has a recent
# snapshot to load instantly (the page still fetches live in the browser too).
#
# Notes:
#  - GitHub's scheduled runs can be delayed minutes during peak load.
#  - Scheduled workflows auto-pause after 60 days with no repo activity; just
#    push (or hit "Run workflow") to re-enable.

on:
  schedule:
    - cron: "0 * * * *"      # top of every hour (UTC)
  workflow_dispatch: {}        # manual "Run workflow" button

# allow the built-in token to commit the refreshed data.json
permissions:
  contents: write

# don't pile up overlapping runs
concurrency:
  group: hab-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch + score (writes data.json)
        run: python fetch.py

      - name: Commit refreshed data.json if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No data changes — nothing to commit."
          else
            git commit -m "chore: refresh HAB data.json [skip ci]"
            git push
          fi
