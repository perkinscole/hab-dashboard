<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Charles River HAB Risk Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    :root {
      --bg: #0e1b2a; --panel: #13243a; --panel2: #1b3047; --line: #28415f;
      --text: #e8f0fb; --muted: #93a8c4;
      --low: #2ecc71; --moderate: #f1c40f; --elevated: #e67e22; --high: #e74c3c;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    body { background: var(--bg); color: var(--text); }
    #app { position: fixed; inset: 0; display: flex; }
    #map { flex: 1; }

    header {
      position: absolute; top: 0; left: 0; right: 0; z-index: 5;
      padding: 10px 16px; display: flex; align-items: center; gap: 14px;
      background: linear-gradient(180deg, rgba(8,16,28,.92), rgba(8,16,28,0));
      pointer-events: none;
    }
    header h1 { font-size: 16px; margin: 0; font-weight: 650; letter-spacing: .2px; }
    header .sub { font-size: 12px; color: var(--muted); }
    header .nav { margin-left: auto; display: flex; gap: 8px; pointer-events: auto; }
    header .nav a { font-size: 12px; color: var(--muted); text-decoration: none;
      background: rgba(19,36,58,.85); padding: 6px 11px; border-radius: 8px; border: 1px solid var(--line); }
    header .nav a:hover { color: #e8f0fb; border-color: #2d5278; }
    header .nav a.active { color: #e8f0fb; border-color: #2d5278; }
    .legend { display: flex; gap: 12px; pointer-events: auto;
      background: rgba(19,36,58,.85); padding: 6px 10px; border-radius: 8px; border: 1px solid var(--line); }
    .legend .item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .legend .dot { width: 11px; height: 11px; border-radius: 50%; }

    /* marker pins */
    .pin { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff;
      box-shadow: 0 0 0 2px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.5); cursor: pointer;
      transition: transform .12s ease; }
    .pin:hover { transform: scale(1.25); }
    .pin.sel { transform: scale(1.35); box-shadow: 0 0 0 3px #fff, 0 0 14px rgba(255,255,255,.5); }

    /* side panel */
    #panel {
      width: 380px; max-width: 88vw; background: var(--panel); border-left: 1px solid var(--line);
      overflow-y: auto; z-index: 6; transform: translateX(100%); transition: transform .22s ease;
      display: flex; flex-direction: column;
    }
    #panel.open { transform: translateX(0); }
    .p-head { padding: 16px 16px 8px; border-bottom: 1px solid var(--line); position: relative; }
    .p-head h2 { margin: 0 30px 2px 0; font-size: 17px; }
    .p-head .meta { font-size: 12px; color: var(--muted); }
    .close { position: absolute; top: 12px; right: 12px; cursor: pointer; color: var(--muted);
      background: var(--panel2); border: 1px solid var(--line); border-radius: 6px;
      width: 26px; height: 26px; line-height: 24px; text-align: center; font-size: 16px; }
    .close:hover { color: #fff; }

    .section { padding: 14px 16px; border-bottom: 1px solid var(--line); }
    .section h3 { margin: 0 0 10px; font-size: 12px; text-transform: uppercase;
      letter-spacing: .8px; color: var(--muted); }

    /* dial */
    .dial-wrap { display: flex; align-items: center; gap: 16px; }
    .dial { flex-shrink: 0; }
    .dial-num { font-size: 30px; font-weight: 720; }
    .dial-band { font-size: 13px; font-weight: 650; text-transform: uppercase; letter-spacing: .5px; }
    .dial-note { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* factors */
    .factor { margin-bottom: 10px; }
    .factor .row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
    .factor .name { font-size: 13px; font-weight: 600; }
    .factor .pts { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .factor .bar { height: 6px; background: var(--panel2); border-radius: 4px; margin: 4px 0 3px; overflow: hidden; }
    .factor .bar > span { display: block; height: 100%; border-radius: 4px; }
    .factor .note { font-size: 11px; color: var(--muted); }
    .tag { font-size: 9.5px; padding: 1px 5px; border-radius: 4px; vertical-align: middle;
      margin-left: 6px; border: 1px solid var(--line); }
    .tag.proxy { color: #ffcf6b; border-color: #6b5320; background: #2a2310; }
    .tag.measured { color: #6bd6ff; border-color: #1d4a5e; background: #102530; }

    /* outlook strip */
    .outlook { display: flex; gap: 8px; }
    .ochip { flex: 1; text-align: center; background: var(--panel2); border: 1px solid var(--line);
      border-radius: 8px; padding: 9px 4px; }
    .ochip .d { font-size: 11px; color: var(--muted); }
    .ochip .s { font-size: 18px; font-weight: 700; margin: 3px 0; }
    .ochip .b { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; }
    .crude { font-size: 10.5px; color: var(--muted); margin-top: 8px; font-style: italic; }

    /* sparklines */
    .spark { margin-bottom: 14px; }
    .spark .lbl { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }
    .spark .lbl b { font-weight: 600; }
    .spark .lbl .cur { color: var(--muted); }
    .spark svg { width: 100%; height: 46px; display: block; }
    .empty { font-size: 12px; color: var(--muted); font-style: italic; }

    .hint { position: absolute; bottom: 14px; left: 14px; z-index: 5; font-size: 11px;
      color: var(--muted); background: rgba(19,36,58,.85); padding: 6px 10px;
      border-radius: 8px; border: 1px solid var(--line); }
    .err { padding: 20px; color: #ffb4b4; }

    /* loading overlay */
    #loader { position: absolute; inset: 0; z-index: 8; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: rgba(14,27,42,.82); backdrop-filter: blur(2px); }
    #loader.hide { display: none; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--line);
      border-top-color: #6bd6ff; border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader .msg { font-size: 13px; color: var(--muted); }
    /* freshness badge in header */
    .fresh { font-size: 10px; padding: 1px 7px; border-radius: 999px; margin-left: 8px;
      vertical-align: middle; border: 1px solid var(--line); }
    .fresh.live { color: #7dffa6; border-color: #1f5e36; background: #0f2a1a; }
    .fresh.snap { color: #ffcf6b; border-color: #6b5320; background: #2a2310; }
  </style>
</head>
<body>
  <div id="app">
    <div id="map">
      <header>
        <div>
          <h1>Charles River HAB Risk</h1>
          <div class="sub" id="gen">loading…</div>
        </div>
        <nav class="nav">
          <a href="index.html" class="active">Dashboard</a>
          <a href="learn.html">Learn</a>
        </nav>
        <div class="legend" id="legend"></div>
      </header>
      <div class="hint">Click a site marker for score, factors &amp; 7-day trends.</div>
      <div id="loader">
        <div class="spinner"></div>
        <div class="msg" id="loaderMsg">Loading live water data…</div>
      </div>
    </div>
    <aside id="panel"></aside>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="score.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
